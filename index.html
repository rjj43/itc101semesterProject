<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phishing Detection Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-badge">SECURITY TRAINING</div>
    <h1>Phishing Detection Trainer</h1>
    <p class="subtitle">Inspect each message carefully. Hover over <span class="highlight">links</span>, <span class="highlight">sender addresses</span>, and <span class="highlight">attachments</span> to see where they really point.</p>
  </header>

  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="email-container">

    <div id="email"></div>

    <div id="hint-bar">
      <span class="hint-icon">💡</span>
      <span id="hint-text">Hover over highlighted elements to see actual URLs and addresses</span>
    </div>

  </div>

  <div id="button-row">
    <button id="btn-legit" onclick="guess('legit')">
      <span class="btn-icon">✓</span> Legitimate
    </button>
    <button id="btn-phishing" onclick="guess('phishing')">
      <span class="btn-icon">⚠</span> Phishing
    </button>
  </div>

  <div id="result-area">
    <div id="result"></div>
  </div>

  <button id="btn-next" onclick="nextEmail()">Next Example →</button>

  <div id="scoreboard">
    <div class="score-item">
      <span class="score-label">Score</span>
      <span id="score-val">0</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <span class="score-label">Question</span>
      <span id="question-val">1 / 10</span>
    </div>
  </div>

  <div id="game-over" style="display:none;">
    <h2 id="final-title"></h2>
    <p id="final-score"></p>
    <button onclick="location.reload()">Play Again</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
